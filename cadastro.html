<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Acadêmico | Cadastro</title>
    <link rel="stylesheet" href="pagina_inicio.css">
    <link rel="stylesheet" href="pagina_login.css">
</head>
<body>

    <header class="cabecalho">
        <div class="logotipo">
            <a href="pagina_inicio.html"><h1>Portal<span>Acadêmico</span></h1></a>
        </div>
        <nav aria-label="Navegação principal">
            <ul class="menu-navegacao">
                <li><a href="pagina_inicio.html">Início</a></li>
                <li><a href="#">Cursos</a></li>
                <li><a href="pagina_login.html" class="ativo">Área do Aluno</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="principal-login"> 
        <section class="container-login container-cadastro"> 
            <div class="cartao-login">
                <div class="cabecalho-login">
                    <h2>Crie sua Conta</h2>
                    <p>Junte-se ao Portal Acadêmico e comece sua jornada.</p>
                </div>

                <form class="formulario-login" action="#" method="POST">
                    
                    <div class="grupo-formulario">
                        <label for="nome">Nome Completo <span class="asterisco-obrigatorio" aria-hidden="true">*</span></label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>

                    <div class="grupo-formulario">
                        <label for="cpf">CPF <span class="asterisco-obrigatorio" aria-hidden="true">*</span></label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Formato: 000.000.000-00">
                    </div>

                    <div class="grupo-formulario">
                        <label for="email-cadastro">E-mail <span class="asterisco-obrigatorio" aria-hidden="true">*</span></label>
                        <input type="email" id="email-cadastro" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="grupo-formulario linha-formulario"> 
                        <div class="coluna-formulario">
                            <label for="senha">Senha <span class="asterisco-obrigatorio" aria-hidden="true">*</span></label>
                            <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required minlength="8">
                        </div>
                        <div class="coluna-formulario">
                            <label for="confirma-senha">Confirmar <span class="asterisco-obrigatorio" aria-hidden="true">*</span></label>
                            <input type="password" id="confirma-senha" placeholder="Repita a senha" required minlength="8">
                        </div>
                    </div>

                    <div class="grupo-formulario">
                        <label for="curso-interesse">Curso de Interesse</label>
                        <select id="curso-interesse" class="selecao-formulario">
                            <option value="">Selecione um curso (opcional)</option>
                            <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                            <option value="cc">Ciência da Computação</option>
                            <option value="si">Sistemas de Informação</option>
                            <option value="ec">Engenharia de Computação</option>
                        </select>
                    </div>

                    <div class="opcoes-formulario">
                        <label class="checkbox-termos">
                            <input type="checkbox" required> Aceito os <a href="#" class="link-termos">Termos de Uso</a> e <a href="#" class="link-termos">Privacidade</a>.
                        </label>
                    </div>

                    <button type="submit" class="botao-enviar">Cadastrar</button>
                </form>

                <div class="links-rodape-login">
                    <p>Já possui conta? <a href="pagina_login.html">Faça Login</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="rodape-site">
        <div class="base-rodape">
            <p>&copy; 2026 Portal Acadêmico. Todos os direitos reservados. Trabalho acadêmico.</p>
        </div>
    </footer>

    <script src="pagina_inicio.js"></script>
</body>
</html>
